name: Metrics
on:
  # Schedule daily updates (Runs at midnight Perth time)
  schedule: [{cron: "0 16 * * *"}]
  # Lines below let you run workflow manually
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Core Options
          user: BlancJH
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Australia/Perth
          
          # Isometric Calendar Plugin (Shows your commit graph in 3D)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Languages Plugin (Will highlight your C++ and Python usage)
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Habits Plugin (Tracks your commit times and coding habits)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
